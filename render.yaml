services:
  - type: web
    name: example-scraper-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SCRAPER_DEFAULT_HEADLESS
        value: "1"
      - key: SCRAPER_MAX_CONCURRENT_JOBS
        value: "1"
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: studentcap
